<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더 칼림바 - AI 실시간 완곡 연주 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.5s ease; overflow-x: hidden; }
        
        .tine { 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 1px 0 3px rgba(255,255,255,0.4), inset -1px 0 3px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .correct-animation { animation: correct-pulse 0.6s ease; }
        @keyframes correct-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background-color: #fef3c7 !important; }
            100% { transform: scale(1); }
        }

        .wood-texture {
            background-color: #8B5E3C;
            background-image: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 4px;
        }

        .active-tine {
            background-image: linear-gradient(to bottom, #fb923c, #f97316, #ea580c) !important;
            transform: scaleY(1.05);
            z-index: 30;
        }

        #staff-container {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        
        .note-item {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s;
        }

        .note-active {
            filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.4));
        }

        /* 박자 길이에 따른 시각화 */
        .note-body {
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            overflow: hidden;
        }

        .beat-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background-color: rgba(34, 197, 94, 0.3);
            width: 0%;
            transition: width linear;
        }

        .modal-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-[#FFFBF5] min-h-screen">

    <!-- 모드 선택 -->
    <div id="setup-screen" class="fixed inset-0 z-50 bg-orange-50 flex flex-col items-center justify-center p-6 text-slate-800">
        <div class="max-w-md w-full bg-white rounded-[50px] shadow-2xl p-10 text-center border-t-8 border-orange-400">
            <h1 class="text-4xl font-black mb-2 tracking-tight text-orange-600 uppercase leading-none">The Kalimba</h1>
            <p class="text-slate-500 mb-10 font-medium text-lg">인공지능 실시간 칼림바 교육</p>
            <div class="space-y-4">
                <button onclick="showSkillSetup('easy')" class="group w-full bg-orange-500 hover:bg-orange-600 text-white py-8 rounded-3xl shadow-lg transition-all active:scale-95">
                    <span class="block text-3xl font-black">간편 모드</span>
                    <span class="text-sm opacity-80 font-bold tracking-widest mt-1 block">글씨를 크게, 박자를 길게!</span>
                </button>
                <button onclick="showSkillSetup('trendy')" class="group w-full bg-slate-800 hover:bg-slate-900 text-white py-8 rounded-3xl shadow-lg transition-all active:scale-95">
                    <span class="block text-3xl font-black">일반 모드</span>
                    <span class="text-sm opacity-60 font-bold tracking-widest mt-1 block">멋진 배경의 트렌디 모드</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 곡 선택 및 단계 선택 -->
    <div id="skill-screen" class="hidden fixed inset-0 z-50 bg-orange-50 flex flex-col items-center justify-center p-6 text-slate-800 overflow-y-auto">
        <div id="level-selector" class="max-w-md w-full bg-white rounded-[50px] shadow-2xl p-10 text-center relative">
            <button onclick="goBackToSetup()" class="absolute top-8 left-8 text-slate-400 hover:text-orange-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h2 class="text-4xl font-black mb-8 italic">단계 선택</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="showSongList('intro')" class="w-full bg-green-500 hover:bg-green-600 text-white py-8 rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95">입문 단계</button>
                <button onclick="showSongList('basic')" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-8 rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95">초급 단계</button>
                <button onclick="showSongList('mid')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-8 rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95">중급 단계</button>
                <button onclick="showSongList('adv')" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-8 rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95">고급 단계</button>
            </div>
        </div>

        <div id="song-list" class="hidden max-w-md w-full bg-white rounded-[50px] shadow-2xl p-10 text-center relative">
            <button onclick="goBackToLevel()" class="absolute top-8 left-8 text-slate-400 hover:text-orange-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h2 id="current-level-title" class="text-4xl font-black mb-8 italic">입문 단계</h2>
            <div id="song-buttons" class="space-y-4"></div>
        </div>
    </div>

    <!-- 앱 메인 -->
    <div id="app-container" class="hidden max-w-4xl mx-auto min-h-screen flex flex-col p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-4 text-left">
                <button onclick="goBackToSkill()" class="w-14 h-14 bg-white shadow-md rounded-2xl text-slate-400 hover:text-orange-500 transition-all flex items-center justify-center active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <h2 id="mode-title" class="text-3xl font-black text-slate-800 leading-tight">간편 모드</h2>
                    <div class="flex items-center gap-2 mt-0.5">
                        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
                        <span id="status-text" class="text-sm font-bold text-slate-400 uppercase tracking-widest">준비</span>
                    </div>
                </div>
            </div>
            <button id="mic-btn" onclick="toggleMic()" class="w-16 h-16 bg-white shadow-xl rounded-2xl text-slate-400 hover:text-orange-500 transition-all flex items-center justify-center active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
        </header>

        <div id="display-card" class="bg-white rounded-[40px] shadow-xl p-8 mb-4 flex flex-col relative border-b-8 border-orange-100 min-h-[350px] overflow-hidden">
            <div id="progress-bar" class="absolute top-0 left-0 h-2 bg-orange-400 transition-all duration-300 rounded-full z-30" style="width: 0%"></div>
            
            <div class="flex justify-between items-center mb-6 px-4">
                <p id="lesson-info" class="text-lg font-black text-slate-400 tracking-tight">곡 연주 중</p>
                <div id="real-time-pitch" class="text-sm font-mono text-slate-300 font-bold italic">연주 대기</div>
            </div>

            <div id="staff-container" class="relative flex-1 flex items-center justify-center bg-slate-50/50 rounded-3xl border border-slate-100">
                <div class="absolute left-[80px] w-2 h-2/3 bg-orange-400/40 rounded-full z-10"></div>
                <div id="notes-scroll" class="absolute left-[80px] flex items-center"></div>
                
                <div id="checkpoint-overlay" class="hidden absolute inset-0 z-40 bg-white/95 flex flex-col items-center justify-center p-8 text-center modal-fade-in">
                    <div id="checkpoint-icon" class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4 animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </div>
                    <h3 id="checkpoint-title" class="text-4xl font-black text-slate-800 mb-2">참 잘했어요!</h3>
                    <p id="checkpoint-desc" class="text-2xl text-slate-500 mb-8 font-medium leading-relaxed">계속 가볼까요?</p>
                    <div id="checkpoint-buttons" class="flex gap-4 w-full max-w-[400px]">
                        <button onclick="retrySection()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-6 rounded-3xl font-black text-2xl transition-all active:scale-95">다시 하기</button>
                        <button onclick="nextSection()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-6 rounded-3xl font-black text-2xl shadow-lg transition-all active:scale-95">다음 단계</button>
                    </div>
                </div>
            </div>

            <div id="feedback-message" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-4xl font-black opacity-0 transition-all transform translate-y-2 text-green-500 z-20 italic">나이스!</div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-end pb-4">
            <div class="relative w-full max-w-2xl h-[360px] flex flex-col items-center justify-start">
                <div id="kalimba-body" class="absolute bottom-0 w-full h-[95%] wood-texture rounded-t-[100px] rounded-b-[60px] shadow-[0_20px_60px_rgba(0,0,0,0.5)] border-b-[10px] border-[#5D3F2B]"></div>
                <div class="relative z-20 w-[94%] flex items-start justify-center gap-[2px] mt-[5%] h-full" id="tines-wrapper"></div>
            </div>
        </div>
    </div>

    <script>
        const allTines = [
            { note: "D6", num: "2''", freq: 1174.66, height: 105, offset: -40 },
            { note: "B5", num: "7'", freq: 987.77, height: 120, offset: -30 },
            { note: "G5", num: "5'", freq: 783.99, height: 135, offset: -20 },
            { note: "E5", num: "3'", freq: 659.25, height: 150, offset: -10 },
            { note: "C5", num: "1'", freq: 523.25, height: 165, offset: 0 },
            { note: "A4", num: "6", freq: 440.00, height: 180, offset: 10 },
            { note: "F4", num: "4", freq: 349.23, height: 195, offset: 20 },
            { note: "D4", num: "2", freq: 293.66, height: 210, offset: 30 },
            { note: "C4", num: "1", freq: 261.63, height: 240, offset: 45 },
            { note: "E4", num: "3", freq: 329.63, height: 210, offset: 30 },
            { note: "G4", num: "5", freq: 392.00, height: 195, offset: 20 },
            { note: "B4", num: "7", freq: 493.88, height: 180, offset: 10 },
            { note: "D5", num: "2'", freq: 587.33, height: 165, offset: 0 },
            { note: "F5", num: "4'", freq: 698.46, height: 150, offset: -10 },
            { note: "A5", num: "6'", freq: 880.00, height: 135, offset: -20 },
            { note: "C6", num: "1''", freq: 1046.50, height: 120, offset: -30 },
            { note: "E6", num: "3''", freq: 1318.51, height: 105, offset: -40 }
        ];

        const levels = {
            intro: { title: "입문 단계", songs: [
                { name: "순서대로 익히기", score: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5"].map(n => ({n, b:1})) },
                { name: "랜덤 위치 찾기", score: [], type: 'random' }
            ]},
            basic: { title: "초급 단계", songs: [
                { name: "학교 종", score: [
                    {n:"G4", b:1}, {n:"G4", b:1}, {n:"A4", b:1}, {n:"A4", b:1}, {n:"G4", b:1}, {n:"G4", b:1}, {n:"E4", b:2, sectionEnd: true},
                    {n:"G4", b:1}, {n:"G4", b:1}, {n:"E4", b:1}, {n:"E4", b:1}, {n:"D4", b:4, sectionEnd: true},
                    {n:"G4", b:1}, {n:"G4", b:1}, {n:"A4", b:1}, {n:"A4", b:1}, {n:"G4", b:1}, {n:"G4", b:1}, {n:"E4", b:2, sectionEnd: true},
                    {n:"G4", b:1}, {n:"E4", b:1}, {n:"D4", b:1}, {n:"E4", b:1}, {n:"C4", b:4, sectionEnd: true}
                ]}
            ]},
            mid: { title: "중급 단계", songs: [
                { name: "작은 별", score: [
                    {n:"C4", b:1}, {n:"C4", b:1}, {n:"G4", b:1}, {n:"G4", b:1}, {n:"A4", b:1}, {n:"A4", b:1}, {n:"G4", b:2, sectionEnd: true},
                    {n:"F4", b:1}, {n:"F4", b:1}, {n:"E4", b:1}, {n:"E4", b:1}, {n:"D4", b:1}, {n:"D4", b:1}, {n:"C4", b:2, sectionEnd: true}
                ]}
            ]},
            adv: { title: "고급 단계", songs: [
                { name: "신호등", score: [
                    {n:"C5", b:1}, {n:"C5", b:1}, {n:"C5", b:1}, {n:"G4", b:1}, {n:"A4", b:1}, {n:"C5", b:1}, {n:"A4", b:2, sectionEnd: true},
                    {n:"D5", b:1}, {n:"D5", b:1}, {n:"D5", b:1}, {n:"A4", b:1}, {n:"B4", b:1}, {n:"D5", b:1}, {n:"B4", b:2, sectionEnd: true}
                ]},
                { name: "바다가 보이는 마을", score: [
                    {n:"A4", b:1}, {n:"B4", b:1}, {n:"C5", b:1}, {n:"D5", b:1}, {n:"E5", b:1}, {n:"C5", b:1}, {n:"A4", b:4, sectionEnd: true}
                ]}
            ] }
        };

        let currentScore = [];
        let currentIdx = 0;
        let lastSectionStartIdx = 0;
        let selectedMode = 'easy';
        let audioContext, analyser, animationId, dataArray;
        let isListening = false;
        let isPaused = false;
        let isWaitingForBeat = false;

        function showSkillSetup(mode) {
            selectedMode = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('skill-screen').classList.remove('hidden');
            showLevelSelector();
        }

        function showLevelSelector() {
            document.getElementById('level-selector').classList.remove('hidden');
            document.getElementById('song-list').classList.add('hidden');
        }

        function showSongList(levelKey) {
            const level = levels[levelKey];
            if(!level) return;
            document.getElementById('current-level-title').innerText = level.title;
            const container = document.getElementById('song-buttons');
            container.innerHTML = '';
            
            level.songs.forEach((song) => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-slate-50 hover:bg-orange-100 py-8 rounded-3xl font-black text-slate-700 transition-colors text-2xl flex justify-between px-10 items-center border-2 border-slate-100";
                btn.innerHTML = `<span>${song.name}</span> <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="text-orange-400"><path d="m9 18 6-6-6-6"/></svg>`;
                btn.onclick = () => {
                    if(song.type === 'random') {
                        const notes = ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5"];
                        song.score = [...notes].sort(() => Math.random() - 0.5).map(n => ({n, b:1}));
                    }
                    startApp(song);
                };
                container.appendChild(btn);
            });
            document.getElementById('level-selector').classList.add('hidden');
            document.getElementById('song-list').classList.remove('hidden');
        }

        function goBackToSetup() {
            document.getElementById('skill-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function goBackToLevel() { showLevelSelector(); }

        function goBackToSkill() {
            stopMic();
            currentIdx = 0;
            isPaused = false;
            document.getElementById('checkpoint-overlay').classList.add('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('skill-screen').classList.remove('hidden');
        }

        function startApp(song) {
            currentScore = song.score;
            currentIdx = 0;
            lastSectionStartIdx = 0;
            isPaused = false;
            isWaitingForBeat = false;
            document.getElementById('skill-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('lesson-info').innerText = song.name;
            
            if(selectedMode === 'easy') {
                document.getElementById('mode-title').innerText = "간편 모드 (크게)";
                document.getElementById('feedback-message').innerText = "최고예요!";
            } else {
                document.getElementById('mode-title').innerText = "일반 모드";
                document.getElementById('feedback-message').innerText = "GREAT!";
            }

            renderKalimba();
            renderScore();
            updateTarget();
        }

        function renderKalimba() {
            const wrapper = document.getElementById('tines-wrapper');
            wrapper.innerHTML = '';
            allTines.forEach(t => {
                const div = document.createElement('div');
                div.id = `tine-${t.note}`;
                div.className = `tine flex-1 bg-gradient-to-b from-slate-200 via-slate-300 to-slate-400 rounded-b-full flex flex-col items-center justify-end pb-8 transition-all border-x border-black/5`;
                div.style.height = `${t.height}px`;
                div.style.marginTop = `${t.offset}px`;
                div.innerHTML = `<span class="${selectedMode === 'easy' ? 'text-2xl' : 'text-lg'} font-black text-slate-800">${t.num}</span>`;
                wrapper.appendChild(div);
            });
        }

        function renderScore() {
            const scroll = document.getElementById('notes-scroll');
            scroll.innerHTML = '';
            let currentLeft = 0;
            const beatWidth = selectedMode === 'easy' ? 120 : 90;
            
            currentScore.forEach((item, index) => {
                const targetTine = allTines.find(t => t.note === item.n);
                const noteDiv = document.createElement('div');
                noteDiv.id = `note-item-${index}`;
                noteDiv.className = `note-item absolute flex items-center justify-center`;
                
                const width = (item.b * beatWidth) - 10;
                noteDiv.style.left = `${currentLeft}px`;
                noteDiv.style.width = `${width}px`;
                
                const bgColor = selectedMode === 'easy' ? 'bg-orange-500' : 'bg-slate-700';
                
                noteDiv.innerHTML = `
                    <div class="note-body ${bgColor} text-white w-full shadow-lg border-b-4 border-black/20">
                        <div id="progress-${index}" class="beat-progress"></div>
                        <span class="relative z-10 ${selectedMode === 'easy' ? 'text-3xl' : 'text-xl'}">${targetTine.num}</span>
                    </div>
                `;
                
                scroll.appendChild(noteDiv);
                currentLeft += (item.b * beatWidth);
            });
        }

        function updateTarget() {
            const scroll = document.getElementById('notes-scroll');
            const targetNote = currentScore[currentIdx];
            if (!targetNote) return;
            const beatWidth = selectedMode === 'easy' ? 120 : 90;
            
            let offset = 0;
            for(let i=0; i<currentIdx; i++) {
                offset += currentScore[i].b * beatWidth;
            }
            scroll.style.transform = `translateX(-${offset}px)`;

            document.querySelectorAll('.note-item').forEach((el, i) => {
                el.classList.toggle('note-active', i === currentIdx);
                if (i < currentIdx) el.style.opacity = "0.2";
                else if (i === currentIdx) el.style.opacity = "1";
                else el.style.opacity = "0.6";
            });

            document.querySelectorAll('.tine').forEach(t => t.classList.remove('active-tine'));
            const activeTine = document.getElementById(`tine-${targetNote.n}`);
            if(activeTine) activeTine.classList.add('active-tine');

            document.getElementById('progress-bar').style.width = `${(currentIdx / currentScore.length) * 100}%`;
        }

        async function toggleMic() {
            if (isListening) return stopMic();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // 기존 컨텍스트가 닫혀있거나 없는 경우에만 새로 생성
                if (!audioContext || audioContext.state === 'closed') {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                dataArray = new Float32Array(analyser.fftSize);
                source.connect(analyser);
                
                isListening = true;
                document.getElementById('status-dot').className = "w-4 h-4 rounded-full bg-green-500 animate-pulse";
                document.getElementById('status-text').innerText = "듣고 있어요";
                document.getElementById('mic-btn').classList.replace('text-slate-400', 'text-green-500');
                updatePitch();
            } catch (err) { alert("마이크 권한이 필요합니다."); }
        }

        function stopMic() {
            isListening = false;
            cancelAnimationFrame(animationId);
            // AudioContext가 닫혀있지 않을 때만 닫기 시도
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close().catch(e => console.warn("AudioContext close failed:", e));
            }
            document.getElementById('status-dot').className = "w-4 h-4 rounded-full bg-slate-300";
            document.getElementById('status-text').innerText = "준비";
            document.getElementById('mic-btn').classList.replace('text-green-500', 'text-slate-400');
        }

        function updatePitch() {
            if (!isListening || isPaused || isWaitingForBeat) return;
            animationId = requestAnimationFrame(updatePitch);
            if (!analyser) return;
            analyser.getFloatTimeDomainData(dataArray);
            let pitch = autoCorrelate(dataArray, audioContext.sampleRate);
            if (pitch !== -1) {
                checkMatch(pitch);
            }
        }

        function autoCorrelate(buffer, sampleRate) {
            let rms = 0;
            for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
            if (Math.sqrt(rms / buffer.length) < 0.05) return -1;
            let c = new Float32Array(buffer.length);
            for (let i = 0; i < buffer.length; i++) {
                for (let j = 0; j < buffer.length - i; j++) c[i] = c[i] + buffer[j] * buffer[j + i];
            }
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < buffer.length; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            return sampleRate / maxpos;
        }

        function checkMatch(freq) {
            const targetNote = currentScore[currentIdx];
            if (!targetNote) return;
            const targetTine = allTines.find(t => t.note === targetNote.n);
            if (Math.abs(freq - targetTine.freq) < 15) {
                processBeat(targetNote);
            }
        }

        function processBeat(note) {
            isWaitingForBeat = true;
            
            const feedback = document.getElementById('feedback-message');
            feedback.style.opacity = "1";
            document.getElementById('display-card').classList.add('correct-animation');
            
            const progress = document.getElementById(`progress-${currentIdx}`);
            const beatTime = note.b * 500;
            
            if (progress) {
                progress.style.transition = `width ${beatTime}ms linear`;
                progress.style.width = "100%";
            }

            setTimeout(() => {
                feedback.style.opacity = "0";
                document.getElementById('display-card').classList.remove('correct-animation');
                
                if (currentIdx === currentScore.length - 1) {
                    showFinalCongratulations();
                } else if (note.sectionEnd) {
                    showCheckpoint();
                } else {
                    currentIdx++;
                    updateTarget();
                    isWaitingForBeat = false;
                    updatePitch();
                }
            }, beatTime + 100);
        }

        function showCheckpoint() {
            isPaused = true;
            document.getElementById('checkpoint-overlay').classList.remove('hidden');
        }

        function showFinalCongratulations() {
            isPaused = true;
            document.getElementById('checkpoint-title').innerText = "완곡 성공!";
            document.getElementById('checkpoint-desc').innerText = "정말 멋진 연주였어요!";
            document.getElementById('checkpoint-buttons').innerHTML = `
                <button onclick="goBackToSkill()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-6 rounded-3xl font-black text-2xl shadow-lg transition-all active:scale-95">다른 곡 연주하기</button>
            `;
            document.getElementById('checkpoint-overlay').classList.remove('hidden');
        }

        function retrySection() {
            currentIdx = lastSectionStartIdx;
            hideCheckpoint();
        }

        function nextSection() {
            currentIdx++;
            lastSectionStartIdx = currentIdx;
            hideCheckpoint();
        }

        function hideCheckpoint() {
            document.getElementById('checkpoint-overlay').classList.add('hidden');
            isPaused = false;
            isWaitingForBeat = false;
            updateTarget();
            updatePitch();
        }
    </script>
</body>
</html>
